<h2 mat-dialog-title class="dlg-title">
  <mat-icon class="dlg-title__icon" aria-hidden="true">warning</mat-icon>
  ¿Eliminar servicio?
</h2>

<mat-dialog-content class="dlg-body">
  <p>
    Se eliminará permanentemente
    <strong class="dlg-name">{{ data.service.name }}</strong>.
  </p>
  <p class="dlg-note">
    Si el servicio tiene citas asociadas, la eliminación no será posible; en ese caso puedes
    <strong>inactivarlo</strong> desde el listado.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dlg-actions">
  <button matButton="text" type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="warn" type="button" (click)="confirm()">
    <mat-icon aria-hidden="true">delete_forever</mat-icon>
    Eliminar
  </button>
</mat-dialog-actions>
