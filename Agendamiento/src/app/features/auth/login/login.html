<div class="auth-shell">
  <aside class="auth-brand" aria-hidden="true">
    <div #videoHost class="auth-brand-video-host" aria-hidden="true"></div>
    <div class="auth-brand-overlay"></div>
    <div class="auth-brand-content">
      <div class="auth-brand-badge">
        <mat-icon>pets</mat-icon>
      </div>
      <h2 class="auth-brand-title">Agendamiento</h2>
      <p class="auth-brand-copy">
        Agenda, clientes y recordatorios en un solo panel pensado para clínicas veterinarias.
      </p>
    </div>
  </aside>

  <div class="auth-main">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>Iniciar sesión</mat-card-title>
        <mat-card-subtitle>Veterinaria — agenda y fichas</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="full">
            <mat-label>Correo</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="email" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="full">
            <mat-label>Contraseña</mat-label>
            <input matInput type="password" formControlName="password" autocomplete="current-password" />
          </mat-form-field>
          @if (error()) {
            <p class="error" role="alert">{{ error() }}</p>
          }
          <button mat-flat-button color="primary" class="full submit-btn" type="submit" [disabled]="loading()">
            Entrar
          </button>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <a routerLink="/auth/register">Crear cuenta</a>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
